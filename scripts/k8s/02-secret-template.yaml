# =============================================================================
# Secret template — DO NOT commit real values.
#
# Create the actual secret with kubectl:
#
#   kubectl create secret generic hydro-om-secrets \
#     --namespace hydro-om \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-... \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Or use Sealed Secrets / Vault / ESO for GitOps-safe secret management.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: hydro-om-secrets
  namespace: hydro-om
  labels:
    app.kubernetes.io/name: hydro-om-copilot
type: Opaque
stringData:
  # Required: Anthropic API key for Claude
  ANTHROPIC_API_KEY: "REPLACE_ME"

  # Optional: LangSmith tracing API key (only if LANGCHAIN_TRACING_V2=true)
  # LANGCHAIN_API_KEY: "REPLACE_ME"
