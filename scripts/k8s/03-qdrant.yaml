# =============================================================================
# Qdrant — Vector database
# StatefulSet (stable pod identity for data integrity) + PVC + Service
# =============================================================================

# ── PersistentVolumeClaim ─────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-storage
  namespace: hydro-om
  labels:
    app.kubernetes.io/name: hydro-om-copilot
    app.kubernetes.io/component: qdrant
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi  # Adjust based on vector store size
  # storageClassName: standard  # Uncomment and set your StorageClass

---
# ── StatefulSet ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: hydro-om
  labels:
    app.kubernetes.io/name: hydro-om-copilot
    app.kubernetes.io/component: qdrant
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hydro-om-copilot
      app.kubernetes.io/component: qdrant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hydro-om-copilot
        app.kubernetes.io/component: qdrant
    spec:
      securityContext:
        runAsUser:  1000
        runAsGroup: 1000
        fsGroup:    1000
      containers:
      - name: qdrant
        image: qdrant/qdrant:v1.11.0
        ports:
        - name: http
          containerPort: 6333
        - name: grpc
          containerPort: 6334
        env:
        - name: QDRANT__SERVICE__HTTP_PORT
          value: "6333"
        - name: QDRANT__SERVICE__GRPC_PORT
          value: "6334"
        resources:
          requests:
            cpu:    "250m"
            memory: "512Mi"
          limits:
            cpu:    "2"
            memory: "4Gi"
        volumeMounts:
        - name: qdrant-storage
          mountPath: /qdrant/storage
        readinessProbe:
          httpGet:
            path: /healthz
            port: 6333
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: 6333
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 5
      volumes:
      - name: qdrant-storage
        persistentVolumeClaim:
          claimName: qdrant-storage

---
# ── Service (ClusterIP — internal only) ──────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: hydro-om
  labels:
    app.kubernetes.io/name: hydro-om-copilot
    app.kubernetes.io/component: qdrant
spec:
  selector:
    app.kubernetes.io/name: hydro-om-copilot
    app.kubernetes.io/component: qdrant
  ports:
  - name: http
    port: 6333
    targetPort: 6333
  - name: grpc
    port: 6334
    targetPort: 6334
  type: ClusterIP
