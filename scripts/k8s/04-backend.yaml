# =============================================================================
# Backend — FastAPI + LangGraph
#
# Image:  ${REGISTRY}/hydro-om-backend:${IMAGE_TAG}
#         Substituted by scripts/docker/deploy-k8s.sh via envsubst / kustomize
#
# PVCs required (create before applying):
#   - hydro-om-knowledge-base  (KB markdown docs + ChromaDB index backup)
#   - hydro-om-models-cache    (HuggingFace / sentence-transformers model weights ~4GB)
#
# Note on model loading:
#   First startup downloads ~4GB of model weights (bge-large-zh + reranker).
#   Use startupProbe with a generous failureThreshold to allow model download.
#   The models-cache PVC prevents re-downloading on pod restart.
# =============================================================================

# ── PersistentVolumeClaims ────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hydro-om-knowledge-base
  namespace: hydro-om
  labels:
    app.kubernetes.io/name: hydro-om-copilot
    app.kubernetes.io/component: backend
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
  # storageClassName: standard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hydro-om-models-cache
  namespace: hydro-om
  labels:
    app.kubernetes.io/name: hydro-om-copilot
    app.kubernetes.io/component: backend
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi   # bge-large-zh (~1.3GB) + reranker (~1.1GB) + overhead
  # storageClassName: standard

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hydro-om-backend
  namespace: hydro-om
  labels:
    app.kubernetes.io/name: hydro-om-copilot
    app.kubernetes.io/component: backend
  annotations:
    # For GitOps: set by deploy-k8s.sh / CI pipeline
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: hydro-om-copilot
      app.kubernetes.io/component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # zero-downtime rollout
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hydro-om-copilot
        app.kubernetes.io/component: backend
    spec:
      # ── Security ────────────────────────────────────────────────────────
      securityContext:
        runAsUser:    1001
        runAsGroup:   0       # GID 0 for OpenShift compatibility
        fsGroup:      0
        runAsNonRoot: true
      automountServiceAccountToken: false

      # ── Init: wait for Qdrant to be ready ───────────────────────────────
      initContainers:
      - name: wait-for-qdrant
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until wget -qO- http://qdrant:6333/healthz; do
            echo "Waiting for Qdrant…"; sleep 5
          done
          echo "Qdrant is ready."

      containers:
      - name: backend
        # Image substituted by deploy-k8s.sh / kustomize
        image: "${REGISTRY:+${REGISTRY}/}hydro-om-backend:${IMAGE_TAG:-latest}"
        imagePullPolicy: IfNotPresent

        ports:
        - name: http
          containerPort: 8000

        # ── Config from ConfigMap + Secret ────────────────────────────────
        envFrom:
        - configMapRef:
            name: hydro-om-config
        - secretRef:
            name: hydro-om-secrets

        # ── Resources ────────────────────────────────────────────────────
        # Adjust based on actual model memory usage.
        # bge-large-zh + reranker require ~3-4GB together.
        resources:
          requests:
            cpu:    "500m"
            memory: "4Gi"
          limits:
            cpu:    "4"
            memory: "8Gi"

        # ── Volume mounts ─────────────────────────────────────────────────
        volumeMounts:
        - name: knowledge-base
          mountPath: /app/knowledge_base
        - name: models-cache
          mountPath: /app/models

        # ── Probes ────────────────────────────────────────────────────────
        # startupProbe: generous timeout for first-run model download
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 60    # 60 × 10s = 10 min max startup
          periodSeconds:    10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds:       10
          failureThreshold:    3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds:       30
          failureThreshold:    5

      # ── Volumes ──────────────────────────────────────────────────────────
      volumes:
      - name: knowledge-base
        persistentVolumeClaim:
          claimName: hydro-om-knowledge-base
      - name: models-cache
        persistentVolumeClaim:
          claimName: hydro-om-models-cache

      # ── Pod spread for multi-replica HA ─────────────────────────────────
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: backend

---
# ── Service (ClusterIP — accessed via Ingress) ────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: hydro-om-backend
  namespace: hydro-om
  labels:
    app.kubernetes.io/name: hydro-om-copilot
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/name: hydro-om-copilot
    app.kubernetes.io/component: backend
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP
