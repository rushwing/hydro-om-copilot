name: CI

# ── Triggers ─────────────────────────────────────────────────────────────────
# PR gate:    every PR open/update targeting main (blocking merge)
# Agent loop: after a PR merges to main (finds next claimable task)
# Daily:      02:00 UTC — P0+P1 E2E; auto-opens issue on failure
# Weekly:     03:00 UTC Sunday — full E2E suite; auto-opens issue on failure

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"    # daily  — P0+P1 E2E
    - cron: "0 3 * * 0"    # weekly — full E2E suite (Sunday)

# Cancel in-progress runs for PRs/pushes; never cancel scheduled builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'schedule' && github.event.schedule || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

# ── Jobs ──────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Backend quality checks ───────────────────────────────────────────────
  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Lint (ruff check)
        run: uv tool run ruff check backend/

  # ── 2. Backend tests ─────────────────────────────────────────────────────────
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    env:
      AUTO_RANDOM_PROBLEMS_GEN: "false"
      SENSOR_POLL_INTERVAL: "999"
      ANTHROPIC_API_KEY: "sk-ant-mock-ci-key"
      VECTOR_STORE_TYPE: "chroma"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen --extra dev

      - name: Run pytest
        working-directory: backend
        run: uv run pytest --tb=short -q

  # ── 3. Frontend quality checks ───────────────────────────────────────────────
  frontend-checks:
    name: Frontend checks (tsc + ESLint + Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check (tsc --noEmit)
        working-directory: frontend
        run: npm run type-check

      - name: Lint (ESLint)
        working-directory: frontend
        run: npm run lint

      - name: Unit tests (Vitest)
        working-directory: frontend
        run: npm run test

  # ── 4. REQ coverage gate ─────────────────────────────────────────────────────
  req-coverage:
    name: REQ coverage check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check REQ coverage
        run: python3 scripts/check_req_coverage.py --strict

  # ── 5. BUG frontmatter gate ──────────────────────────────────────────────────
  bug-frontmatter:
    name: BUG frontmatter check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check BUG frontmatter
        run: python3 scripts/check_bug_frontmatter.py --strict

  # ── 6. E2E smoke tests (PR gate — P0 only) ──────────────────────────────────
  e2e-smoke:
    name: E2E smoke P0 (Playwright)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E P0 tests
        working-directory: frontend
        run: npm run e2e:p0

  # ── 7. Daily E2E build (P0 + P1) ────────────────────────────────────────────
  daily-e2e:
    name: Daily E2E P0+P1 (Playwright)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 2 * * *'
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E P0+P1 tests
        working-directory: frontend
        run: npm run e2e:daily

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CI] Daily E2E (P0+P1) failed — ${date}`,
              body: `## Daily E2E build failure\n\n**Date**: ${date}\n**Run**: ${runUrl}\n\n### 排查步骤\n1. 打开上方 Run 链接查看失败的测试\n2. 确认是代码回归还是环境问题\n3. 在此 issue 中标注根因后关闭\n`,
              labels: ['bug', 'ci-failure'],
            });

  # ── 8. Weekly E2E build (full suite + LLM canary) ────────────────────────────
  weekly-e2e:
    name: Weekly E2E full suite + canary (Playwright + pytest)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * 0'
    permissions:
      issues: write
    env:
      AUTO_RANDOM_PROBLEMS_GEN: "false"
      SENSOR_POLL_INTERVAL: "999"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      VECTOR_STORE_TYPE: "chroma"
    steps:
      - uses: actions/checkout@v4

      # ── Node / Playwright ────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run full E2E suite
        working-directory: frontend
        run: npm run e2e

      # ── Python / LLM canary ──────────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen --extra dev

      - name: Run LLM canary tests
        working-directory: backend
        run: uv run pytest -m canary --tb=short -q

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CI] Weekly E2E full suite failed — ${date}`,
              body: `## Weekly E2E full suite failure\n\n**Date**: ${date}\n**Run**: ${runUrl}\n\n### 排查步骤\n1. 打开上方 Run 链接查看失败的测试\n2. 确认是 P2/P3 用例本身 flaky 还是真实回归\n3. canary 失败时确认是模型波动还是 prompt 回归\n4. 在此 issue 中标注根因后关闭\n`,
              labels: ['bug', 'ci-failure'],
            });

  # ── 9. Agent loop (post-merge only) ─────────────────────────────────────────
  # Scans tasks/ for claimable work after a PR merges to main.
  # Outputs a report but does NOT auto-trigger agents (HITL gate still required).
  agent-loop:
    name: Agent loop (find next task)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Find next claimable tasks
        run: |
          if [ -f scripts/agent-loop.py ]; then
            python3 scripts/agent-loop.py
          else
            echo "scripts/agent-loop.py not yet implemented — skipping agent loop"
          fi
