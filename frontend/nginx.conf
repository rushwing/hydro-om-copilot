# =============================================================================
# Hydro O&M Copilot — Nginx config (frontend container)
#
# ${BACKEND_URL} is substituted at container start via envsubst.
#   docker-compose : BACKEND_URL=http://backend:8000
#   K8s (Ingress)  : BACKEND_URL=http://hydro-om-backend:8000
#
# SSE note: proxy_buffering off + proxy_read_timeout 300s required for
#           long-running Server-Sent Event streams.
# =============================================================================

server {
    listen       80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── SPA fallback (React Router) ───────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;  # no caching for index.html (contains hashed asset refs)
    }

    # ── Static assets (cache-busted by Vite content hash) ────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API proxy → backend (SSE-aware) ──────────────────────────────────────
    # In K8s with split-path Ingress: remove this block and route at Ingress level.
    location /diagnosis/ {
        proxy_pass         ${BACKEND_URL}/diagnosis/;
        proxy_http_version 1.1;

        # Disable keep-alive pooling to avoid SSE stream reuse issues
        proxy_set_header   Connection         "";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        # SSE requirements: no buffering, long timeout
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    location = /health {
        proxy_pass        ${BACKEND_URL}/health;
        proxy_set_header  Host $host;
        access_log        off;
    }

    # ── Hide nginx version ────────────────────────────────────────────────────
    server_tokens off;
}
